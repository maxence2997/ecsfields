name: CI

on:
  workflow_dispatch:
  push:
    branches:
      [
        main,
        "feat/**",
        "feature/**",
        "refactor/**",
        "bugfix/**",
        "fix/**",
        "chore/**",
      ]
    paths-ignore:
      - "**.md"
      - "LICENSE"
      - ".github/instructions/**"
  pull_request:
    branches: [ main ]
    paths-ignore:
      - "**.md"
      - "LICENSE"
      - ".github/instructions/**"

jobs:
  check:
    name: check
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      TEST_COUNT: ${{ (github.ref == 'refs/heads/main' || github.base_ref == 'main')
        && '50' || '10' }}
      TEST_TIMEOUT: ${{ (github.ref == 'refs/heads/main' || github.base_ref == 'main')
        && '180s' || '90s' }}
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
      - name: Download modules
        run: go mod download
      - name: fmt
        run: |
          test -z "$(gofmt -l .)" || (echo "formatting issues — run 'make fmt'"; exit 1)
          test -z "$(go run golang.org/x/tools/cmd/goimports@latest -local github.com/maxence2997 -l .)" || (echo "import issues — run 'make fmt'"; exit 1)
      - name: lint
        uses: golangci/golangci-lint-action@v9
        with:
          version: v2.11.2
      - name: test
        run: go test -v -race -count=${{ env.TEST_COUNT }} -timeout ${{ env.TEST_TIMEOUT
          }} ./...
